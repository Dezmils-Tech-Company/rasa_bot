#### This file contains tests to evaluate that your bot behaves as expected.
#### If you want to learn more, please see the docs: https://rasa.com/docs/rasa/testing-your-assistant

stories:
- story: happy path 1
  steps:
  - user: |
      hello there!
    intent: greet
  - action: utter_greet
  - user: |
      amazing
    intent: affirm
  - action: utter_affirm

- story: happy path 2
  steps:
  - user: |
      hello there!
    intent: greet
  - action: utter_greet
  - user: |
      I want to know about your services
    intent: ask_services_menu
  - action: utter_ask_services_menu
  - user: |
      Tell me about software development
    intent: ask_software_services
  - action: utter_ask_software_services

- story: sad path 1
  steps:
  - user: |
      hello
    intent: greet
  - action: utter_greet
  - user: |
      not good
    intent: deny
  - action: utter_deny

- story: sad path 2
  steps:
  - user: |
      hello
    intent: greet
  - action: utter_greet
  - user: |
      I have a complaint
    intent: complaint
  - action: utter_complaint

- story: say goodbye
  steps:
  - user: |
      bye-bye!
    intent: goodbye
  - action: utter_goodbye

- story: bot challenge
  steps:
  - user: |
      are you a bot?
    intent: bot_challenge
  - action: utter_iamabot

- story: provide name and ask for help
  steps:
  - user: |
      my name is John
    intent: provide_name
  - action: utter_provide_name
  - user: |
      I need help with a website
    intent: ask_software_services
  - action: utter_ask_software_services

- story: ask for payment info
  steps:
  - user: |
      how do I pay for your services?
    intent: ask_payment_info
  - action: utter_ask_payment_info

- story: request human agent
  steps:
  - user: |
      I want to talk to a human
    intent: request_human_agent
  - action: utter_request_human_agent